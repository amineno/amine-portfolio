<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoption - Groom'go</title>
    <meta name="description" content="Adoptez votre compagnon idéal. Découvrez nos animaux disponibles à l'adoption.">
    
    <!-- Favicon -->
    <link rel="icon" href="assets/img/logo.png" type="image/png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/adoption.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="assets/img/Gemini_Generated_Image_imsa1bimsa1bimsa-removebg-preview.png" alt="Groom'go Logo" class="navbar-logo">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#home">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#about">À propos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#services">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="notes.html">Avis</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Connexion</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-primary ms-2 text-white" href="booking.html">Réserver</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="adoption-hero">
        <div class="container">
            <div class="row justify-content-center text-center">
                <div class="col-lg-8">
                    <h1 class="hero-title">Trouvez Votre Compagnon Idéal</h1>
                    <p class="hero-subtitle">Donnez une seconde chance à un animal qui attend son foyer pour toujours</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters Section -->
    <section class="filters-section py-4 bg-light">
        <div class="container">
            <div class="row g-3 align-items-center">
                <div class="col-md-3">
                    <select class="form-select" id="typeFilter">
                        <option value="all">Tous les animaux</option>
                        <option value="chien">Chiens</option>
                        <option value="chat">Chats</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="ageFilter">
                        <option value="all">Tous les âges</option>
                        <option value="bebe">Bébé (0-1 an)</option>
                        <option value="jeune">Jeune (1-3 ans)</option>
                        <option value="adulte">Adulte (3-7 ans)</option>
                        <option value="senior">Senior (7+ ans)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sizeFilter">
                        <option value="all">Toutes les tailles</option>
                        <option value="petit">Petit</option>
                        <option value="moyen">Moyen</option>
                        <option value="grand">Grand</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100" id="resetFilters">
                        <i class="fas fa-redo me-2"></i>Réinitialiser
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Adoption Cards Section -->
    <section class="adoption-section py-5">
        <div class="container">
            <div class="row" id="adoptionGrid">
                <!-- Cards will be dynamically loaded here -->
            </div>
            
            <div class="text-center mt-5" id="noResults" style="display: none;">
                <i class="fas fa-search fa-3x text-muted mb-3"></i>
                <h4>Aucun animal trouvé</h4>
                <p class="text-muted">Essayez de modifier vos filtres</p>
            </div>
        </div>
    </section>

    <!-- Adoption Modal -->
    <div class="modal fade" id="adoptionModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Détails de l'adoption</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalContent">
                    <!-- Content will be loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/adoption-page.js"></script>
</body>
</html>
